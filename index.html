<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Studio | Manage Your LLM Prompts</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-cog"></i> Cloud Sync Setup</h2>
            <p class="modal-desc">Enter your GitHub credentials to enable cloud syncing. Your token is stored locally.</p>
            <div class="form-control">
                <label>GitHub Personal Access Token</label>
                <input type="password" id="github-token-input" placeholder="ghp_...">
            </div>
            <div class="form-control">
                <label>Gist ID</label>
                <input type="text" id="gist-id-input" placeholder="e.g. a1b2c3d4e5f6...">
            </div>
            <div class="modal-actions">
                <button class="btn" id="save-settings-btn">Save & Sync</button>
                <button class="btn btn-secondary" id="close-settings-btn">Cancel</button>
            </div>
        </div>
    </div>

    <div id="prompt-modal" class="modal">
        <div class="modal-content modal-large">
            <h2 id="prompt-modal-title">Add New Prompt</h2>
            <form id="prompt-form">
                <div class="form-control">
                    <label>Title *</label>
                    <input type="text" id="prompt-title" required placeholder="e.g. Code Reviewer">
                </div>
                <div class="form-row">
                    <div class="form-control flex-grow">
                        <label>Category</label>
                        <input type="text" id="prompt-category" placeholder="e.g. Coding" list="category-list">
                        <datalist id="category-list"></datalist>
                    </div>
                    <div class="form-control flex-grow">
                        <label>Tags (comma separated)</label>
                        <input type="text" id="prompt-tags" placeholder="e.g. react, debug">
                    </div>
                </div>
                <div class="form-control">
                    <label>Prompt Text *</label>
                    <textarea id="prompt-text" required rows="8" placeholder="You are an expert..."></textarea>
                </div>
                <div class="form-control">
                    <label>Notes (Optional)</label>
                    <textarea id="prompt-notes" rows="2" placeholder="Any usage notes..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn" id="save-prompt-btn">Save Prompt</button>
                    <button type="button" class="btn btn-secondary" id="close-prompt-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div class="app-container">
        <header>
            <div class="header-left">
                <h1>Prompt Studio</h1>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="theme-toggle" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="icon-btn" id="sync-btn" title="Cloud Sync"><i class="fas fa-cloud"></i></button>
                <button class="icon-btn" id="settings-btn" title="Settings"><i class="fas fa-cog"></i></button>
            </div>
        </header>

        <main>
            <div class="toolbar">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search prompts, tags...">
                    <button class="clear-search-btn" id="clear-search-btn"><i class="fas fa-times"></i></button>
                </div>
                <div class="filters">
                    <select id="category-filter">
                        <option value="">All Categories</option>
                    </select>
                    <select id="sort-select">
                        <option value="date-desc">Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="name-asc">Name (A-Z)</option>
                    </select>
                    <button class="btn" id="add-prompt-btn"><i class="fas fa-plus"></i> New Prompt</button>
                </div>
            </div>

            <div class="prompts-grid" id="prompts-grid"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>

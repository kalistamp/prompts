<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Prompt Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-cog"></i> Cloud Sync Setup</h2>
            <p class="modal-desc">Enter your GitHub credentials to enable cloud syncing. Your token is stored locally. <strong>Warning: Never share your Personal Access Token.</strong></p>
            <div class="form-control">
                <label>GitHub Personal Access Token (with 'gist' scope)</label>
                <input type="password" id="github-token-input" placeholder="ghp_...">
            </div>
            <div class="form-control">
                <label>Gist ID</label>
                <input type="text" id="gist-id-input" placeholder="e.g. a1b2c3d4e5f6...">
            </div>
            <div class="modal-actions">
                <button class="btn" id="save-settings-btn">Save & Sync</button>
                <button class="btn btn-secondary" id="close-settings-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Prompt Modal -->
    <div id="prompt-modal" class="modal">
        <div class="modal-content modal-large">
            <h2 id="prompt-modal-title">Add New Prompt</h2>
            <form id="prompt-form">
                <div class="form-control">
                    <label>Title *</label>
                    <input type="text" id="prompt-title" required placeholder="e.g. Code Reviewer">
                </div>
                <div class="form-row">
                    <div class="form-control flex-grow">
                        <label>Category</label>
                        <input type="text" id="prompt-category" placeholder="e.g. Coding" list="category-list">
                        <datalist id="category-list"></datalist>
                    </div>
                    <div class="form-control flex-grow">
                        <label>Tags (comma separated)</label>
                        <input type="text" id="prompt-tags" placeholder="e.g. react, debug">
                    </div>
                </div>
                <div class="form-control">
                    <label>Prompt Text *</label>
                    <textarea id="prompt-text" required rows="6" placeholder="You are an expert..."></textarea>
                </div>
                <div class="form-control">
